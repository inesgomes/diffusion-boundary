project: 20251120_text_image_diffusion

user-args: 
  device: cuda:1
  seed: 28
  batch-size: 1
  save-metrics-disk: True
  save-images-disk: False
  log-plots: True

dataset:
  name: ILSVRC/imagenet-1k
  n_classes: 1000
  split: train
  num-images: 2500

classifier:
  name: google/vit-base-patch16-224 # microsoft/resnet-50
  lib: transformers
  calibrate: True

diffusion:
  pipeline: latentguidance
  name: CompVis/stable-diffusion-v1-4
  type: sd
  args:
    num-inference-steps: 40
    prompt-strategy: single # and 
    classes:
      - leopard, Panthera pardus
      - jaguar, panther, Panthera onca, Felis onca
      - cheetah, chetah, Acinonyx jubatus
    guidance: kldb 
    # alpha
    alpha: 0.01
      # - 0
      # - 0.01
      # - 0.03
      # - 0.05
      # - 0.08
      # - 0.1
    guidance-freq: 5
    # beta
    guidance-scale: 7.5
    guidance-rescale: 0.7
    negative-prompt: blurry, deformed, low quality, watermark, text, extra limbs, ugly # if not specified, it is empty 

evaluation:
  num-images: 2500
  viz-sample-size: 10
  attr-map: False
