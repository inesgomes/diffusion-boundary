# working
project: 20241121_diffusion

device: cuda:1
seed: 42
batch-size: 64

log:
  images: False

dataset:
  name: cifar10
  n_classes: 10

classifier:
  name: hf_hub:SamAdamDay/resnet18_cifar10 
  lib: timm

diffusion:
  pipeline: guidance
  type: pndm # pndm, ddpm, ddim
  name: google/ddpm-cifar10-32
  args:
    num-inference-steps: 100
    guidance: cross-entropy # entropy, norm-entropy, margin, margin-top2, deepgini, least-confidence, cross-entropy
    alpha: 1
    guidance-freq: 2 # 0 means that the diffusion is without guidance

evaluation:
  num-images: 1000
  viz-sample-size: 30
  certainty-threshold: 0.85 # this may be automatically computed in some way? (e.g. 1 - 1/n_classes)
