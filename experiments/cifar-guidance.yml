# working
project: 20241121_diffusion

device: cuda:1
seed: 42
batch-size: 64

log:
  images: False

dataset:
  name: cifar10
  n_classes: 10

classifier:
  name: hf_hub:SamAdamDay/resnet18_cifar10 
  lib: timm

diffusion:
  pipeline: guidance
  type: pndm # pndm, ddpm, ddim
  name: google/ddpm-cifar10-32
  args:
    guidance: entropy # entropy, norm-entropy
    num-inference-steps: 300
    alpha: 1
    guidance-freq: 10 # 0 means that the diffusion is without guidance

evaluation:
  num-images: 30
  viz-sample-size: 30
  certainty-threshold: 0.8 # this may be automatically computed in some way? (e.g. 1 - 1/n_classes)
