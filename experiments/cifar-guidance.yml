# working
project: 20241121_diffusion

device: cuda:1
seed: 42
batch-size: 64

log:
  images: False

dataset:
  name: cifar10
  n_classes: 10

classifier:
  name: hf_hub:SamAdamDay/resnet18_cifar10 # hf_hub:edadaltocg/resnet50_cifar10
  lib: timm

diffusion:
  pipeline: guidance
  type: pndm # pndm, ddpm, ddim
  name: google/ddpm-cifar10-32
  args:
    guidance: entropy # or norm-entropy
    num-inference-steps: 100
    alpha: 0.2

evaluation:
  num-images: 20
  viz-sample-size: 20
