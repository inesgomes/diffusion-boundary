# working
project: 20241121_diffusion

device: cuda:1
seed: 42
batch-size: 128

log:
  images: False

dataset:
  name: cifar10
  n_classes: 10

classifier:
  name: hf_hub:SamAdamDay/resnet18_cifar10 # hf_hub:edadaltocg/resnet50_cifar10
  lib: timm

diffusion:
  pipeline: guidance
  type: pndm # pndm, ddpm, ddim
  name: google/ddpm-cifar10-32
  args:
    guidance: entropy # entropy, norm-entropy
    num-inference-steps: 350
    alpha: 0.2
    guidance-freq: 10

evaluation:
  num-images: 3000
  viz-sample-size: 30
  certainty-threshold: 0.8 # this may be automatically computed in some way? (e.g. 1 - 1/n_classes)
