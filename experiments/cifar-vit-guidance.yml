# working
project: 20241121_diffusion

user-args: 
  device: cuda:1
  seed: 42
  batch-size: 64
  log-images: False
  log-plots: True
  display-rgb: True

dataset:
  name: cifar10
  n_classes: 10

classifier:
  name: aaraki/vit-base-patch16-224-in21k-finetuned-cifar10 #ahsanjavid/convnext-tiny-finetuned-cifar10 
  lib: transformers

diffusion:
  pipeline: guidance
  type: pndm # pndm, ddpm, ddim
  name: google/ddpm-cifar10-32
  args:
    guidance: entropy # entropy, norm-entropy
    num-inference-steps: 250
    alpha: 2
    guidance-freq: 1 # 0 means that the diffusion is without guidance

evaluation:
  num-images: 2500
  viz-sample-size: 30
  certainty-threshold: 0.8 # this may be automatically computed in some way? (e.g. 1 - 1/n_classes)
  mc-dropout:
    n-samples: 15
    threshold: 0.3
