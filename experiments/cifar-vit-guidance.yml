project: 20241121_diffusion

device: cuda:1
seed: 42

dataset:
  name: cifar10
  n_classes: 10

classifier:
  name: ahsanjavid/convnext-tiny-finetuned-cifar10
  lib: transformers

diffusion:
  pipeline: guidance
  type: pndm # pndm, ddpm, ddim
  name: google/ddpm-cifar10-32
  args:
    guidance: entropy
    num-inference-steps: 100
    batch-size: 10
    alpha: 0.2

evaluation:
  viz-sample-size: 5
