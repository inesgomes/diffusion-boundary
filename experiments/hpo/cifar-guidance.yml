project: 20250213_hpo_diffusion

user-args: 
  device: cuda:1
  seed: 42
  batch-size: 64
  log-images: False
  log-plots: False
  display-rgb: True

dataset:
  name: cifar10
  n_classes: 10

classifier:
  name: hf_hub:SamAdamDay/resnet18_cifar10 
  lib: timm

diffusion:
  pipeline: guidance
  type: pndm # pndm, ddpm, ddim
  name: google/ddpm-cifar10-32
  args:
    num-inference-steps: 500
    guidance: 
      - second-rank # max 0.5
      - norm-entropy # max 1
      - margin-top2 # max 1
      - deepgini # 
      - least-confidence
      - cross-entropy
    alpha: 
      - 1
      - 1.5
      - 2
      - 4
      - 8
    guidance-freq:
      - 1
      - 2

evaluation:
  num-images: 4000
  viz-sample-size: 30
  certainty-threshold: 0.8 # this may be automatically computed in some way? (e.g. 1 - 1/n_classes)
  mc-dropout:
    n-samples: 15
    threshold: 0.3
