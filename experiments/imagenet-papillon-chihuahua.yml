project: 20250401_text_image_diffusion

user-args: 
  device: cuda:1
  seed: 28
  batch-size: 1
  save-disk: False
  log-plots: True
  display-rgb: True

dataset:
  name: ILSVRC/imagenet-1k
  n_classes: 1000
  split: train
  num-images: 2500

classifier:
  name: microsoft/resnet-50
  lib: transformers

diffusion:
  pipeline: latentguidance
  name: CompVis/stable-diffusion-v1-4
  type: sd
  args:
    num-inference-steps: 40
    prompt-strategy: <classes>
    classes:
      - Chihuahua
      - papillon
      - orange
    guidance: kl-div-target
    # alpha
    alpha:
      - 0
      - 0.05
      - 0.1
      - 0.15
      - 0.2
      - 0.5
      - 1
    guidance-freq: 5
    # beta
    guidance-scale:
      - 3
      - 6
      - 9
    guidance-rescale: 0.7
    negative-prompt: blurry, deformed, low quality, watermark, text, extra limbs, ugly # if not specified, it is empty 

evaluation:
  num-images: 2500
  viz-sample-size: 10
  certainty-threshold: 0.8
