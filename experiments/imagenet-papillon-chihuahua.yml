# RUNNING : VIT NORMAL

project: 20250801_text_image_diffusion

user-args: 
  device: cuda
  seed: 28
  batch-size: 1
  save-disk: False
  log-plots: True
  display-rgb: True

dataset:
  name: ILSVRC/imagenet-1k
  n_classes: 1000
  split: train
  num-images: 1000

classifier:
  name: google/vit-base-patch16-224
  lib: transformers
  corrupt: 0

diffusion:
  pipeline: latentguidance
  name: CompVis/stable-diffusion-v1-4
  type: sd
  args:
    num-inference-steps: 30
    prompt-strategy: <classes>
    classes:
      - Chihuahua
      - papillon
    guidance: kl-div-target
    # alpha
    alpha:
      # - 0
      - 0.05
      - 0.1
      - 0.15
      - 0.2
      - 0.5
      # - 1
    guidance-freq: 5
    # beta
    guidance-scale:
      - 3 # missing alpha=1
      - 6 # missing alpha=0
      - 9 # missing alpha=0,1
    guidance-rescale: 0.7
    negative-prompt: blurry, deformed, low quality, watermark, text, extra limbs, ugly # if not specified, it is empty 

evaluation:
  num-images: 1000
  viz-sample-size: 10
  certainty-threshold: 0.8
