# WORKING
project: 20250401_text_image_diffusion

user-args: 
  device: cuda:1
  seed: 28
  batch-size: 1
  save-disk: True
  log-plots: True
  display-rgb: True

dataset:
  name: ILSVRC/imagenet-1k
  n_classes: 1000
  split: train
  num-images: 2500 

classifier:
  name: microsoft/resnet-50 # imagenet-1k 224x224
  lib: transformers

diffusion:
  pipeline: latentguidance
  name: CompVis/stable-diffusion-v1-4 # stabilityai/stable-diffusion-2
  type: sd
  args:
    num-inference-steps: 40
    prompt-strategy: <classes>
      # <classes>
      # One realistic hybrid of <classes>, even for humans
      # An ambiguous but realistic <classes>
    classes: # pelican vs flamingo
      - Chihuahua
      - papillon
     #- leopard, Panthera pardus
     #- jaguar, panther, Panthera onca, Felis onca
     #- cheetah, chetah, Acinonyx jubatus
    guidance: 
      - kl-div-target
      #- entropy
    # alpha
    alpha:
      - 0
      - 0.1
      - 0.2
      - 0.4
      #- 0.6
      #- 1
    guidance-freq: 5
    # beta
    guidance-scale: 6
      # - 1
      # - 3
      # - 6
      # - 9
    guidance-rescale: 0.8
    negative-prompt: blurry, deformed, low quality, watermark, text, extra limbs, ugly # if not specified, it is empty 

evaluation:
  num-images: 2500
  viz-sample-size: 10
  certainty-threshold: 0.8
