# WORKING
project: 20250219_text_image_diffusion

user-args: 
  device: cuda:1
  seed: 42
  batch-size: 1
  log-images: False
  log-plots: True
  display-rgb: True

dataset:
  name: ILSVRC/imagenet-1k
  n_classes: 1000
  split: train

classifier:
  name: microsoft/resnet-50 # imagenet-1k 224x224
  lib: transformers

diffusion:
  pipeline: latentguidance
  name: CompVis/stable-diffusion-v1-4
  type: sd
  args:
    num-inference-steps: 30
    prompt-strategy: One realistic hybrid of <classes>, even for humans. 
      # <classes>
      # A realistic mix of <classes>
      # A realistic mix of <classes>, combining the features of both, blending the shapes, sizes, and general appearance of each. 
    classes:
      - pelican
      - flamingo
    guidance: cross-entropy
    alpha: 0.001
    guidance-freq: 1
    guidance-scale: 3.5
    guidance-rescale: 0.8
    negative-prompt: blurry, deformed, low quality, watermark, text, extra limbs, ugly # if not specified, it is empty 

evaluation:
  num-images: 10
  viz-sample-size: 10
  certainty-threshold: 0.8
