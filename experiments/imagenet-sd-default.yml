# working
project: 20250124_diffusion

user-args: 
  device: cuda:1
  seed: 42
  batch-size: 64
  log-images: False
  log-plots: True
  display-rgb: True

dataset:
  name: ILSVRC/imagenet-1k
  n_classes: 1000
  split: train

classifier:
  name: microsoft/resnet-50 # imagenet-1k 224x224
  lib: transformers

diffusion:
  name: CompVis/stable-diffusion-v1-4
  type: text-to-image
  args:
    num-inference-steps: 50

evaluation:
  num-images: 200
  viz-sample-size: 30
  certainty-threshold: 0.8
