project: 20241121_diffusion

device: cuda:1
seed: 42

dataset:
  name: mnist
  n_classes: 10

classifier:
  name: farleyknight-org-username/vit-base-mnist #fxmarty/resnet-tiny-mnist #
  lib: transformers

diffusion:
  type: ddpm # pndm, ddpm, ddim
  name: 1aurent/ddpm-mnist
  pipeline: guidance
  args:
    guidance: entropy
    num-inference-steps: 100
    batch-size: 5000
    alpha: 0.5

evaluation:
  viz-sample-size: 50
