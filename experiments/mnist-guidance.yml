# working
project: 20241121_diffusion

user-args: 
  device: cuda:1
  seed: 42
  batch-size: 64
  log-images: False
  log-plots: True
  display-rgb: False

dataset:
  name: mnist
  n_classes: 10

classifier:
  name: farleyknight-org-username/vit-base-mnist
  lib: transformers

diffusion:
  pipeline: guidance
  type: ddpm # pndm, ddpm, ddim
  name: 1aurent/ddpm-mnist
    # dvgodoy/ddpm-cifar10-32-mnist (bad FIDs)
  args:
    guidance: second-rank # entropy, norm-entropy, margin, margin-top2, deepgini, least-confidence, cross-entropy
    num-inference-steps: 100
    alpha: 2
    guidance-freq: 2

evaluation:
  num-images: 100 #5000
  viz-sample-size: 30
  certainty-threshold: 0.8
  mc-dropout:
    n-samples: 15
    threshold: 0.3
