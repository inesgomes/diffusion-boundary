# working
project: 20241121_diffusion

device: cuda:1
seed: 42
batch-size: 64

log:
  images: False

dataset:
  name: mnist
  n_classes: 10

classifier:
  name: farleyknight-org-username/vit-base-mnist
  lib: transformers

diffusion:
  pipeline: guidance
  type: ddpm # pndm, ddpm, ddim
  name: 1aurent/ddpm-mnist
    # dvgodoy/ddpm-cifar10-32-mnist (bad FIDs)
  args:
    guidance: cross-entropy # entropy, norm-entropy, margin, margin-top2, deepgini, least-confidence, cross-entropy
    num-inference-steps: 100
    alpha: 1
    guidance-freq: 5

evaluation:
  num-images: 2500
  viz-sample-size: 30
  certainty-threshold: 0.8
  display-rgb: False
