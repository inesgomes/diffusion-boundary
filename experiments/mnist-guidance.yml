# EVALUATION NOT WORKING due to errors in the classifier preprocessor
project: 20241121_diffusion

device: cuda:1
seed: 42

dataset:
  name: mnist
  n_classes: 10

classifier:
  name: fxmarty/resnet-tiny-mnist
  lib: transformers

diffusion:
  type: ddpm # pndm, ddpm, ddim
  name: 1aurent/ddpm-mnist
  pipeline: guidance
  args:
    guidance: entropy
    num-inference-steps: 50
    batch-size: 10
    alpha: 0.5

evaluation:
  num-images: 20
  viz-sample-size: 20
  certainty-threshold: 0.85
