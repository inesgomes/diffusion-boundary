project: 20241121_diffusion

device: cuda:1
seed: 42

dataset:
  name: mnist
  n_classes: 10

classifier:
  name: farleyknight-org-username/vit-base-mnist
  lib: transformers

diffusion:
  type: ddpm # pndm, ddpm, ddim
  name: 1aurent/ddpm-mnist
  pipeline: noguidance
  args:
    num-inference-steps: 100
    batch-size: 50

evaluation:
  num-images: 20
  viz-sample-size: 20
  certainty-threshold: 0.85
