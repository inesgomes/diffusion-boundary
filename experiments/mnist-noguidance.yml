# working
project: 20241121_diffusion

device: cuda:1
seed: 42
batch-size: 64

log:
  images: False

dataset:
  name: mnist
  n_classes: 10

classifier:
  name: farleyknight-org-username/vit-base-mnist
  lib: transformers

diffusion:
  pipeline: noguidance
  type: ddpm # pndm, ddpm, ddim
  name: dvgodoy/ddpm-cifar10-32-mnist
  args:
    num-inference-steps: 500

evaluation:
  num-images: 2500
  viz-sample-size: 30
  certainty-threshold: 0.8
  display-rgb: False
