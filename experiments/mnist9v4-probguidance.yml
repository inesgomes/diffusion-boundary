project: 20241121_diffusion

device: cuda:1
seed: 42

dataset:
  name: mnist.9v4
  n_classes: 2

classifier:
  name: mnist.9v4/cnn-2-1.40022
  lib: local

diffusion:
  type: ddpm # pndm, ddpm, ddim
  name: 1aurent/ddpm-mnist
  pipeline: guidance
  args:
    guidance: acd
    num-inference-steps: 50
    batch-size: 100
    alpha: 5

evaluation:
  viz-sample: 50
