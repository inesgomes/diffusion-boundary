# NOT WORKING: diffusion not working because it is trained for 10 classes intead of 2 classes
project: 20241121_diffusion

device: cuda:1
seed: 42

dataset:
  name: mnist
  subset: [4, 9] # must be number of the label
  n_classes: 2

classifier:
  name: mnist.9v4/cnn-2-1.40022
  lib: local

diffusion:
  type: ddpm # pndm, ddpm, ddim
  name: 1aurent/ddpm-mnist
  pipeline: guidance
  args:
    guidance: acd
    num-inference-steps: 50
    batch-size: 10
    alpha: 5

evaluation:
  num-images: 20
  viz-sample-size: 20
