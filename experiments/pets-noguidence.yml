# not sure if working?
project: 20250124_diffusion

user-args: 
  device: cuda:1
  seed: 42
  batch-size: 64
  log-images: False
  log-plots: True
  display-rgb: True

dataset:
  name: timm/oxford-iiit-pet # pcuenq/oxford-pets (original dataset does not have labels)
  n_classes: 37

classifier:
  name: deyakovleva/vit-base-oxford-iiit-pets
  lib: transformers

diffusion:
  pipeline: noguidance
  name: pcuenq/ddpm-ema-pets-64
  type: ddpm
  args:
    num-inference-steps: 1000

evaluation:
  num-images: 100
  viz-sample-size: 30
  certainty-threshold: 0.8
