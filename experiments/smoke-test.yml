# Smoke test: fast end-to-end run to validate the pipeline

project: smoke_test

user-args:
  device: cuda:0
  seed: 28
  batch-size: 1
  save-metrics-disk: False
  save-images-disk: False
  log-plots: False

dataset:
  name: ILSVRC/imagenet-1k
  n_classes: 1000
  split: train
  num-images: 12

classifier:
  name: microsoft/resnet-50 # google/vit-base-patch16-224
  lib: transformers
  calibrate: True

diffusion:
  pipeline: latentguidance
  name: CompVis/stable-diffusion-v1-4
  type: sd
  scheduler: ddim # klms, ddim
  args:
    num-inference-steps: 10   # few steps: images are ugly
    prompt-strategy: single
    classes:
      - golden retriever
      - Labrador retriever
    guidance: kldb
    alpha: 0.01
    guidance-freq: 2       
    guidance-scale: 7.5
    guidance-rescale: 0.7
    negative-prompt: ""

evaluation:
  num-images: 12
  viz-sample-size: 2
  attr-map: False
